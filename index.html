<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STACKLY — Next-Gen Biotechnology Solutions</title>
  <meta name="description" content="BioNexus delivers cutting-edge biotechnology solutions including genetic sequencing, AI-powered diagnostics, and advanced lab management systems.">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #05080c;
      overflow: hidden;
      color: white;
    }
    /* PARTICLE BACKGROUND */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, #0fa4af33 2px, transparent 3px);
      background-size: 60px 60px;
      animation: particles 20s linear infinite;
      opacity: 0.4;
    }
    @keyframes particles {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(-200px, -200px); }
    }
    /* LOADER CONTAINER */
    .loader {
      text-align: center;
      animation: zoom 4s ease forwards;
      z-index: 10;
      position: relative;
    }
    /* CAMERA ZOOM EFFECT */
    @keyframes zoom {
      0%   { transform: scale(0.5); opacity: 0; }
      40%  { transform: scale(1);   opacity: 1; }
      80%  { transform: scale(1);   opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    /* DNA HELIX SVG ICON */
    .dna-icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 24px;
      animation: spin 3s linear infinite;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    /* LOGO TEXT */
    .brand-name {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #56d2ff, #0fa4af, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-tag {
      font-size: 14px;
      letter-spacing: 6px;
      color: #5dd5ff;
      text-transform: uppercase;
      margin-top: 8px;
      opacity: 0.85;
    }
    /* PROGRESS BAR */
    .progress-wrap {
      margin-top: 40px;
      width: 240px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-left: auto;
      margin-right: auto;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #0fa4af, #56d2ff);
      animation: load 3.5s ease forwards;
      border-radius: 10px;
    }
    @keyframes load {
      0%   { width: 0%; }
      100% { width: 100%; }
    }
    /* Glow ring */
    .glow-ring {
      position: absolute;
      width: 350px;
      height: 350px;
      border: 1px solid rgba(15,164,175,0.2);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }
    .glow-ring:nth-child(2) {
      width: 500px;
      height: 500px;
      animation-delay: 0.5s;
      border-color: rgba(86,210,255,0.12);
    }
    .glow-ring:nth-child(3) {
      width: 650px;
      height: 650px;
      animation-delay: 1s;
      border-color: rgba(86,210,255,0.06);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.05); opacity: 0.5; }
    }
  </style>
</head>
<body>
  <!-- Glow rings behind loader -->
  <div class="glow-ring"></div>
  <div class="glow-ring"></div>
  <div class="glow-ring"></div>
  <div class="loader">
    <!-- DNA-like SVG icon -->
    <svg class="dna-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" stroke="rgba(86,210,255,0.3)" stroke-width="1"/>
      <path d="M30 20 Q50 35 70 20 Q50 35 30 50 Q50 65 70 50 Q50 65 30 80" stroke="#56d2ff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M70 20 Q50 35 30 20 Q50 35 70 50 Q50 65 30 50 Q50 65 70 80" stroke="#0fa4af" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <circle cx="50" cy="35" r="3" fill="#56d2ff"/>
      <circle cx="50" cy="50" r="3" fill="#ffffff"/>
      <circle cx="50" cy="65" r="3" fill="#0fa4af"/>
    </svg>
    <div class="brand-name">STACKLY</div>
    <div class="brand-tag">Next-Gen Biotechnology</div>
    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
  </div>
  <script>
    // After 4 seconds, redirect to home
    setTimeout(() => {
      window.location.href = 'home.html';
    }, 4000);
  </script>
</body>
</html>
